spring.application.name=supplier-document-platform

# =========================
# SERVER CONFIG
# =========================
server.port=8080

# =========================
# DATABASE CONFIG (POSTGRES)
# Values are loaded from environment variables
# =========================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
app.cors.allowed-origin=${APP_CORS_ALLOWED_ORIGIN:http://localhost:5173}

# =========================
# JPA / HIBERNATE CONFIG
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# =========================
# OPTIONAL DEBUGGING
# =========================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.web=DEBUG

# Expose selected Actuator endpoints
management.endpoints.web.exposure.include=health,info,metrics,prometheus

# Always show health details locally/dev
management.endpoint.health.show-details=always

# Add useful app metadata
management.info.env.enabled=true

# Prometheus metrics
management.prometheus.metrics.export.enabled=true

# Optional app info
info.app.name=Supplier Document Platform
info.app.description=Spring Boot backend monitored by Prometheus and Grafana
info.app.version=1.0.0